{% extends "master.html" %}

{% block title %}
    Sightings Map
{% endblock %}

{% block extra_styles %}

    {% load static %}
    <link rel="stylesheet" href="{% static 'sightings/libs/leaflet/dist/leaflet.css' %}" />
    <link rel="stylesheet" href="{% static 'sightings/map.css' %}">
 
{% endblock %}

{% block content %}
    <div id="loading_screen">
        <div class="spinner-border text-light position-absolute top-50 start-50" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- The map div for LeafletJS -->
    <div id="map"></div>

    <!-- The 'side panel' div for user to select dates etc -->
    <div class="metallicss" id="side_panel_blade_closed"><i class="fa-solid fa-bars fa-xl bars_icon"></i></div>
    <div class="metallicss" id="side_panel_blade_open"><i class="fa-solid fa-xmark fa-xl xmark_icon"></i></div>
    <div class="container" id="side_panel"></div>

{% endblock %}

{% block extra_scripts %}
    {% load static %}
    <script src="{% static 'sightings/libs/leaflet/dist/leaflet.js' %}"></script>
    <script type="module" src="{% static 'sightings/libs/metallicss/dist/metallicss.min.js' %}"></script><!-- For metallics css colours. https://www.metallicss.com/ -->
    <script src="{% static 'sightings/map.js' %}"></script>

{% endblock %}
