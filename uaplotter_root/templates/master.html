{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>UAPlotter: {% block title %}{% endblock %}</title>

        <!-- Stylesheets -->
        <link rel="stylesheet" href="{% static 'bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static 'jquery/jquery-ui-1.14.2.custom/jquery-ui.css' %}">
        <link rel="stylesheet" href="{% static 'fontawesome/fontawesome-free-7.3.1-web/css/all.min.css' %}">

        <!-- Favicon -->
        <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/favicon_io/apple-touch-icon.png' %}">
        <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon_io/favicon-32x32.png' %}">
        <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon_io/favicon-16x16.png' %}">
        <link rel="manifest" href="{% static 'favicon/favicon_io/site.webmanifest' %}">

        {% block extra_styles %}
        {% endblock %}

    </head>

    <body>
        {% block content %}
        {% endblock %}
        
        <!-- jQuery -->
        <script src="{% static 'jquery/jquery/jquery-4.0.0.js' %}"></script>
        <script src="{% static 'jquery/jquery-ui-1.14.2.custom/jquery-ui.js' %}"></script>

        <!-- Bootstrap -->
        <script src="{% static 'bootstrap/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js' %}"></script>

        {% block extra_scripts %}
        {% endblock %}

    </body>
</html>
